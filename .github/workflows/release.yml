name: Release

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Verify tag and manifest version
        run: |
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
          test "$GITHUB_REF_NAME" = "$MANIFEST_VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate
        run: |
          npm run eslint
          git diff --check

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            main.js manifest.json styles.css \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
